<svg width="640" height="220" viewBox="0 0 640 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ScalarGrad logo</title>
  <desc id="desc">A compact computation graph flowing into a gradient curve beside the ScalarGrad wordmark.</desc>
  <defs>
    <linearGradient id="nodeGradient" x1="74" y1="32" x2="232" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#35C2FF"/>
      <stop offset="1" stop-color="#7067FF"/>
    </linearGradient>
    <linearGradient id="curveGradient" x1="93" y1="164" x2="263" y2="51" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16A34A"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="38" y="18" width="236" height="184" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="42" y="24" width="228" height="172" rx="34" fill="#F8FAFC" stroke="#E2E8F0"/>

  <g filter="url(#shadow)">
    <path d="M92 150C124 91 157 148 189 86C201 63 220 56 244 55" stroke="url(#curveGradient)" stroke-width="10" stroke-linecap="round"/>
    <path d="M91 149H244" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 10"/>
    <path d="M91 55V150" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 10"/>

    <circle cx="92" cy="150" r="19" fill="url(#nodeGradient)" stroke="white" stroke-width="6"/>
    <circle cx="145" cy="108" r="19" fill="url(#nodeGradient)" stroke="white" stroke-width="6"/>
    <circle cx="190" cy="86" r="19" fill="url(#nodeGradient)" stroke="white" stroke-width="6"/>
    <circle cx="244" cy="55" r="19" fill="url(#nodeGradient)" stroke="white" stroke-width="6"/>

    <path d="M107 144L130 118" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <path d="M162 103L173 93" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <path d="M207 80L226 65" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  </g>

  <text x="302" y="102" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="48" font-weight="800" letter-spacing="0">ScalarGrad</text>
  <text x="306" y="139" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="500">Tiny scalar autograd and neural nets</text>
</svg>
